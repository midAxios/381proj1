      .wire { fill: none; stroke: #111111; stroke-width: 4; marker-end: url(#arrow); }
      .ctrl { fill: none; stroke: #b00000; stroke-width: 3; marker-end: url(#arrowred); }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 26px; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #111111; text-anchor: middle; }
      .red { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #b00000; text-anchor: middle; }
